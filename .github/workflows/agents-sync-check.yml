name: Agents sync check

on:
  push:
    paths:
      - AGENTS.md
      - scripts/sync.py
  pull_request:
    paths:
      - AGENTS.md
      - scripts/sync.py

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/sync.py --check
